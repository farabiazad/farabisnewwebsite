<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>@farabisendthepics | Home</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="home-page">
  <header class="site-nav" aria-label="Main navigation">
    <a href="index.html" aria-current="page">Home</a>
    <a href="projects.html">Projects</a>
    <a href="about.html">About</a>
  </header>

  <main class="home-main" aria-label="Home media">
    <section class="home-media-layout">
      <section class="home-videos" aria-label="Video gallery">
        <div class="home-video-group is-active" data-home-video-group>
          <article class="home-video-card">
            <video class="home-video" muted loop autoplay playsinline preload="metadata">
              <source src="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4" type="video/mp4" />
            </video>
            <p class="home-media-label">Video 01</p>
          </article>
          <article class="home-video-card">
            <video class="home-video" muted loop autoplay playsinline preload="metadata">
              <source src="https://samplelib.com/lib/preview/mp4/sample-5s.mp4" type="video/mp4" />
            </video>
            <p class="home-media-label">Video 02</p>
          </article>
          <article class="home-video-card">
            <video class="home-video" muted loop autoplay playsinline preload="metadata">
              <source src="https://samplelib.com/lib/preview/mp4/sample-10s.mp4" type="video/mp4" />
            </video>
            <p class="home-media-label">Video 03</p>
          </article>
        </div>

        <div class="home-video-group" data-home-video-group>
          <article class="home-video-card">
            <video class="home-video" muted loop autoplay playsinline preload="metadata">
              <source src="https://samplelib.com/lib/preview/mp4/sample-15s.mp4" type="video/mp4" />
            </video>
            <p class="home-media-label">Video 04</p>
          </article>
          <article class="home-video-card">
            <video class="home-video" muted loop autoplay playsinline preload="metadata">
              <source src="https://samplelib.com/lib/preview/mp4/sample-20s.mp4" type="video/mp4" />
            </video>
            <p class="home-media-label">Video 05</p>
          </article>
          <article class="home-video-card">
            <video class="home-video" muted loop autoplay playsinline preload="metadata">
              <source src="https://samplelib.com/lib/preview/mp4/sample-30s.mp4" type="video/mp4" />
            </video>
            <p class="home-media-label">Video 06</p>
          </article>
        </div>
      </section>

      <section class="home-carousel" data-home-carousel aria-label="Photo carousel">
        <div class="home-carousel-track" data-home-track>
          <figure class="placeholder-frame home-photo-tile ratio-3-2">
            <img src="https://picsum.photos/id/1011/1440/960" alt="Sample photo 01" />
          </figure>
          <figure class="placeholder-frame home-photo-tile ratio-3-4">
            <img src="https://picsum.photos/id/1025/1080/1440" alt="Sample photo 02" loading="lazy" />
          </figure>
          <figure class="placeholder-frame home-photo-tile ratio-3-2">
            <img src="https://picsum.photos/id/1035/1440/960" alt="Sample photo 03" loading="lazy" />
          </figure>
          <figure class="placeholder-frame home-photo-tile ratio-3-4">
            <img src="https://picsum.photos/id/1041/1080/1440" alt="Sample photo 04" loading="lazy" />
          </figure>
          <figure class="placeholder-frame home-photo-tile ratio-3-2">
            <img src="https://picsum.photos/id/1050/1440/960" alt="Sample photo 05" loading="lazy" />
          </figure>
          <figure class="placeholder-frame home-photo-tile ratio-3-4">
            <img src="https://picsum.photos/id/1062/1080/1440" alt="Sample photo 06" loading="lazy" />
          </figure>
          <figure class="placeholder-frame home-photo-tile ratio-3-2">
            <img src="https://picsum.photos/id/1069/1440/960" alt="Sample photo 07" loading="lazy" />
          </figure>
          <figure class="placeholder-frame home-photo-tile ratio-3-4">
            <img src="https://picsum.photos/id/1074/1080/1440" alt="Sample photo 08" loading="lazy" />
          </figure>
          <figure class="placeholder-frame home-photo-tile ratio-3-2">
            <img src="https://picsum.photos/id/1084/1440/960" alt="Sample photo 09" loading="lazy" />
          </figure>
        </div>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
