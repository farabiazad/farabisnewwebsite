<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>@farabisendthepics | Projects</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="projects-page">
  <div class="projects-shell">
    <aside class="projects-sidebar">
      <nav class="site-nav projects-nav" aria-label="Main navigation">
        <a href="index.html">Home</a>
        <a href="projects.html" aria-current="page">Projects</a>
        <a href="about.html">About</a>
      </nav>

      <div class="projects-tabs" role="tablist" aria-label="Project categories">
        <button id="tab-couples" class="project-tab is-active" type="button" role="tab" aria-selected="true" aria-controls="panel-couples" data-project-tab="couples">Couples</button>
        <button id="tab-grads" class="project-tab" type="button" role="tab" aria-selected="false" aria-controls="panel-grads" data-project-tab="grads">Grads</button>
        <button id="tab-personal" class="project-tab" type="button" role="tab" aria-selected="false" aria-controls="panel-personal" data-project-tab="personal">Personal Projects</button>
      </div>

      <button class="inquire-cta" type="button" data-inquire-btn hidden aria-hidden="true">Inquire</button>
    </aside>

    <main class="projects-main" aria-label="Project gallery">
      <section id="panel-couples" class="project-panel is-active" role="tabpanel" aria-labelledby="tab-couples" data-project-panel="couples">
        <div class="project-stack">
          <div class="project-line pair-left">
            <figure class="placeholder-frame project-item is-landscape"><figcaption>Couples 01</figcaption></figure>
            <figure class="placeholder-frame project-item is-portrait"><figcaption>Couples 02</figcaption></figure>
          </div>
          <div class="project-line pair-right">
            <figure class="placeholder-frame project-item is-portrait"><figcaption>Couples 03</figcaption></figure>
            <figure class="placeholder-frame project-item is-landscape"><figcaption>Couples 04</figcaption></figure>
          </div>
          <div class="project-line pair-left">
            <figure class="placeholder-frame project-item is-landscape"><figcaption>Couples 05</figcaption></figure>
            <figure class="placeholder-frame project-item is-portrait"><figcaption>Couples 06</figcaption></figure>
          </div>
          <div class="project-line pair-right">
            <figure class="placeholder-frame project-item is-portrait"><figcaption>Couples 07</figcaption></figure>
            <figure class="placeholder-frame project-item is-landscape"><figcaption>Couples 08</figcaption></figure>
          </div>
          <div class="project-line pair-left">
            <figure class="placeholder-frame project-item is-landscape"><figcaption>Couples 09</figcaption></figure>
            <figure class="placeholder-frame project-item is-portrait"><figcaption>Couples 10</figcaption></figure>
          </div>
        </div>

        <section id="inquiry-couples" class="inquiry-wrap" data-inquiry-section="couples">
          <h2 class="inquiry-title">Couples Inquiry</h2>
          <form class="inquiry-form" action="https://formspree.io/f/meelyoyj" method="POST">
            <input type="hidden" name="_subject" value="New Couples Inquiry - Farabi Azad Site" />
            <input type="hidden" name="project_type" value="Couples" />
            <div class="inquiry-grid">
              <label class="inquiry-field">
                <span>Name</span>
                <input type="text" name="name" required />
              </label>
              <label class="inquiry-field">
                <span>Email</span>
                <input type="email" name="email" required />
              </label>
            </div>
            <label class="inquiry-field">
              <span>Session Details</span>
              <textarea name="message" rows="5" placeholder="Tell me your date, location, and vision." required></textarea>
            </label>
            <button class="inquiry-submit" type="submit">Send Inquiry</button>
          </form>
        </section>
      </section>

      <section id="panel-grads" class="project-panel" role="tabpanel" aria-labelledby="tab-grads" data-project-panel="grads" hidden>
        <div class="project-stack">
          <div class="project-line pair-left">
            <figure class="placeholder-frame project-item is-landscape">
              <img src="images/grads/grad-01.jpg" alt="Graduation group by the water" loading="lazy" />
            </figure>
            <figure class="placeholder-frame project-item is-portrait">
              <img src="images/grads/grad-02.jpg" alt="Graduates running across city street" loading="lazy" />
            </figure>
          </div>
          <div class="project-line pair-right">
            <figure class="placeholder-frame project-item is-portrait">
              <img src="images/grads/grad-03.jpg" alt="Graduates hugging under blue sky" loading="lazy" />
            </figure>
            <figure class="placeholder-frame project-item is-landscape">
              <img src="images/grads/grad-04.jpg" alt="Graduates in red gowns at ceremony" loading="lazy" />
            </figure>
          </div>
          <div class="project-line pair-left">
            <figure class="placeholder-frame project-item is-landscape">
              <img src="images/grads/grad-05.jpg" alt="Two graduates celebrating on the street" loading="lazy" />
            </figure>
            <figure class="placeholder-frame project-item is-portrait">
              <img src="images/grads/grad-06.jpg" alt="Graduate portrait in flower garden" loading="lazy" />
            </figure>
          </div>
          <div class="project-line pair-right">
            <figure class="placeholder-frame project-item is-portrait">
              <img src="images/grads/grad-07.jpg" alt="Two graduates seated in formal room" loading="lazy" />
            </figure>
            <figure class="placeholder-frame project-item is-landscape">
              <img src="images/grads/grad-08.jpg" alt="Graduate portrait in warm sunset light" loading="lazy" />
            </figure>
          </div>
          <div class="project-line pair-left">
            <figure class="placeholder-frame project-item is-landscape">
              <img src="images/grads/grad-09.jpg" alt="Graduate at NYU subway sign" loading="lazy" />
            </figure>
            <figure class="placeholder-frame project-item is-portrait">
              <img src="images/grads/grad-10.jpg" alt="Graduate posing in front of mural" loading="lazy" />
            </figure>
          </div>
        </div>

        <section id="inquiry-grads" class="inquiry-wrap" data-inquiry-section="grads">
          <h2 class="inquiry-title">Graduation Inquiry</h2>
          <form class="inquiry-form" action="https://formspree.io/f/meelyoyj" method="POST">
            <input type="hidden" name="_subject" value="New Graduation Inquiry - Farabi Azad Site" />
            <input type="hidden" name="project_type" value="Graduation" />
            <div class="inquiry-grid">
              <label class="inquiry-field">
                <span>Name</span>
                <input type="text" name="name" required />
              </label>
              <label class="inquiry-field">
                <span>Email</span>
                <input type="email" name="email" required />
              </label>
            </div>
            <label class="inquiry-field">
              <span>Session Details</span>
              <textarea name="message" rows="5" placeholder="Tell me your school, preferred date, and location." required></textarea>
            </label>
            <button class="inquiry-submit" type="submit">Send Inquiry</button>
          </form>
        </section>
      </section>

      <section id="panel-personal" class="project-panel" role="tabpanel" aria-labelledby="tab-personal" data-project-panel="personal" hidden>
        <div class="project-stack">
          <div class="project-line pair-left">
            <figure class="placeholder-frame project-item is-landscape"><figcaption>Personal 01</figcaption></figure>
            <figure class="placeholder-frame project-item is-portrait"><figcaption>Personal 02</figcaption></figure>
          </div>
          <div class="project-line pair-right">
            <figure class="placeholder-frame project-item is-portrait"><figcaption>Personal 03</figcaption></figure>
            <figure class="placeholder-frame project-item is-landscape"><figcaption>Personal 04</figcaption></figure>
          </div>
          <div class="project-line pair-left">
            <figure class="placeholder-frame project-item is-landscape"><figcaption>Personal 05</figcaption></figure>
            <figure class="placeholder-frame project-item is-portrait"><figcaption>Personal 06</figcaption></figure>
          </div>
          <div class="project-line pair-right">
            <figure class="placeholder-frame project-item is-portrait"><figcaption>Personal 07</figcaption></figure>
            <figure class="placeholder-frame project-item is-landscape"><figcaption>Personal 08</figcaption></figure>
          </div>
          <div class="project-line pair-left">
            <figure class="placeholder-frame project-item is-landscape"><figcaption>Personal 09</figcaption></figure>
            <figure class="placeholder-frame project-item is-portrait"><figcaption>Personal 10</figcaption></figure>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
